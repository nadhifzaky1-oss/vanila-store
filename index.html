<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Klaim THR</title>

<style>
/* 🔒 LOCK SCROLL TANPA RUSAK KLIK */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
}

body {
  position: fixed;
  width: 100%;
  height: 100%;
  font-family: Arial;
  background: #0f172a;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

* {
  overscroll-behavior: none;
}

/* GETAR */
.shake {
  animation: shake 0.3s;
}
@keyframes shake {
  0% { transform: translate(2px, 2px); }
  25% { transform: translate(-2px, -2px); }
  50% { transform: translate(2px, -2px); }
  75% { transform: translate(-2px, 2px); }
  100% { transform: translate(0, 0); }
}

/* NOTIF */
.notif {
  position: fixed;
  top: -150px;
  left: 50%;
  transform: translateX(-50%);
  background: #108ee9;
  color: white;
  padding: 22px 20px;
  border-radius: 16px;
  width: 92%;
  max-width: 380px;
  transition: 0.4s;
  line-height: 1.6;
  font-size: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
.notif.show { top: 20px; }

/* CARD */
.card {
  background: #020617;
  padding: 35px;
  border-radius: 20px;
  text-align: center;
  width: 320px;
}
.card h2 {
  font-size: 22px;
}

button {
  margin-top: 15px;
  padding: 14px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: #108ee9;
  color: white;
  font-weight: bold;
  font-size: 15px;
}

/* POPUP */
.popup {
  display: none;
  position: fixed;
  bottom: -300px;
  left: 50%;
  transform: translateX(-50%);
  background: white;
  width: 92%;
  max-width: 380px;
  border-radius: 20px 20px 0 0;
  padding: 20px;
  text-align: center;
  transition: 0.4s;
  color: black;
}
.popup.show { bottom: 0; }

/* UANG */
.item {
  position: fixed;
  top: 50%;
  left: 50%;
  font-size: 26px;
  pointer-events: none;
  animation: explode 3s ease-out forwards;
}

@keyframes explode {
  0% {
    transform: translate(0,0) scale(0.5);
    opacity: 1;
  }
  100% {
    transform: translate(var(--x), var(--y)) rotate(1080deg) scale(1.2);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- NOTIF -->
<div id="notif" class="notif">
  <div style="font-size:13px; opacity:0.9;">DANA</div>
  <div style="font-size:16px; font-weight:bold;">Saldo Masuk</div>
  <div style="font-size:14px; margin-top:4px;">
    Hi, Z***y baru saja kirim DANA ke kamu 1.000.000
  </div>
</div>

<!-- CARD -->
<div class="card">
  <div style="font-size:45px;">💸</div>
  <h2>Klaim THRmu!</h2>
  <button onclick="start()">KLAIM SEKARANG</button>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <h3>💰 Konfirmasi</h3>
  <p>Saldo berhasil masuk ke akun Anda</p>
  <button onclick="done()">OK</button>
</div>

<script>
// 🔊 SUARA
function sound() {
  let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
  audio.play();
}

// 📳 GETAR
function vibrate() {
  if (navigator.vibrate) {
    navigator.vibrate([200,100,200]);
  }
}

// 💸 UANG
function chaos() {
  let emojis = ["💸","💵","💶","💴","💷","✨"];

  for (let i = 0; i < 300; i++) {
    let el = document.createElement("div");
    el.className = "item";
    el.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];

    let x = (Math.random() - 0.5) * 2000;
    let y = (Math.random() - 0.5) * 2000;

    el.style.setProperty("--x", x + "px");
    el.style.setProperty("--y", y + "px");

    document.body.appendChild(el);

    setTimeout(() => el.remove(), 3000);
  }
}

// 🚀 START
function start() {
  let notif = document.getElementById("notif");
  let popup = document.getElementById("popup");

  chaos();
  sound();
  vibrate();

  document.body.classList.add("shake");
  setTimeout(() => document.body.classList.remove("shake"), 300);

  setTimeout(() => {
    notif.classList.add("show");
  }, 700);

  setTimeout(() => {
    notif.classList.remove("show");
    popup.classList.add("show");
  }, 4000);
}

// 😈 END
function done() {
  alert("😆 SULTAN PALSU! KENA PRANK!! 😆");
}
</script>

</body>
</html>
