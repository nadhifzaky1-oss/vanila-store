<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>Super Phaser Bros - Landscape Mode</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #000; 
            overflow: hidden; 
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Memaksa rotasi jika user membuka dalam mode portrait di HP */
        @media screen and (orientation: portrait) {
            #warning-message { display: block; }
        }

        #warning-message {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #222; color: white; z-index: 9999;
            text-align: center; padding-top: 20%;
        }

        #ui-layer {
            position: absolute; top: 10px; left: 20px; color: white;
            text-shadow: 2px 2px #000; pointer-events: none; z-index: 10;
            font-size: 18px; font-weight: bold;
        }

        .mobile-controls {
            position: fixed; bottom: 20px; width: 100%; display: flex;
            justify-content: space-between; padding: 0 40px; box-sizing: border-box;
            z-index: 20;
        }

        .btn {
            width: 70px; height: 70px; background: rgba(255, 255, 255, 0.2);
            border-radius: 15px; border: 2px solid rgba(255, 255, 255, 0.5); 
            display: flex; justify-content: center; align-items: center; 
            font-size: 24px; color: white; user-select: none;
            backdrop-filter: blur(5px);
        }

        .btn:active { background: rgba(255, 255, 255, 0.5); transform: scale(0.9); }
        #jump-btn { width: 90px; height: 90px; border-radius: 50%; background: rgba(255, 0, 0, 0.3); }
    </style>
</head>
<body>

<div id="warning-message">
    <h2>🔄 Harap Putar HP Anda ke Mode Landscape</h2>
</div>

<div id="ui-layer">
    💰 SCORE: <span id="score">0</span> | 🚩 LVL: <span id="lvl">1</span>/10 | ❤️ LIFE: <span id="lives">3</span>
</div>

<div class="mobile-controls">
    <div style="display: flex; gap: 15px;">
        <div class="btn" id="left-btn">⬅️</div>
        <div class="btn" id="right-btn">➡️</div>
    </div>
    <div class="btn" id="jump-btn">JUMP</div>
</div>

<script>
/**
 * KONFIGURASI GAME LANDSCAPE
 */
const config = {
    type: Phaser.AUTO,
    scale: {
        mode: Phaser.Scale.FIT, // Menyesuaikan layar secara otomatis
        autoCenter: Phaser.Scale.CENTER_BOTH,
        width: 800,
        height: 450, // Rasio 16:9 yang ideal untuk landscape
    },
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 1200 }, debug: false }
    },
    scene: { preload: preload, create: create, update: update }
};

let player, platforms, cursors, coins, enemies, goal;
let score = 0, currentLevel = 1, lives = 3;
let moveLeft = false, moveRight = false, isJumping = false;

const game = new Phaser.Game(config);

function preload() {
    this.load.image('sky', 'https://labs.phaser.io/assets/skies/bigsky.png');
    this.load.spritesheet('mario', 'https://labs.phaser.io/assets/sprites/dude.png', { frameWidth: 32, frameHeight: 48 });
}

function create() {
    // Background dibuat lebih lebar untuk scrolling
    this.add.image(400, 225, 'sky').setScrollFactor(0.3).setScale(2);

    platforms = this.physics.add.staticGroup();
    coins = this.physics.add.group();
    enemies = this.physics.add.group();

    generateLevel(this, currentLevel);

    player = this.physics.add.sprite(100, 300, 'mario');
    player.setCollideWorldBounds(false);

    // Animasi
    this.anims.create({ key: 'left', frames: this.anims.generateFrameNumbers('mario', { start: 0, end: 3 }), frameRate: 10, repeat: -1 });
    this.anims.create({ key: 'turn', frames: [ { key: 'mario', frame: 4 } ], frameRate: 20 });
    this.anims.create({ key: 'right', frames: this.anims.generateFrameNumbers('mario', { start: 5, end: 8 }), frameRate: 10, repeat: -1 });

    // Colliders
    this.physics.add.collider(player, platforms);
    this.physics.add.collider(enemies, platforms);
    this.physics.add.overlap(player, coins, (p, c) => { 
        c.disableBody(true, true); 
        score += 10; 
        document.getElementById('score').innerText = score;
    });
    this.physics.add.collider(player, enemies, handleEnemyCollision, null, this);
    this.physics.add.overlap(player, goal, nextLevel, null, this);

    // Camera Landscape
    this.cameras.main.setBounds(0, 0, 5000, 450);
    this.physics.world.setBounds(0, 0, 5000, 500);
    this.cameras.main.startFollow(player, true, 0.1, 0.1);

    cursors = this.input.keyboard.createCursorKeys();
    initMobileControls();
}

function generateLevel(scene, level) {
    // Tanah bawah
    for (let i = 0; i < 20; i++) {
        platforms.create(i * 300, 430, null).setDisplaySize(305, 40).setTint(0x4d2600).refreshBody();
    }

    // Rintangan Acak
    for (let i = 1; i < 15; i++) {
        let x = i * 350 + (Math.random() * 50);
        let y = 320 - (Math.random() * 100);
        platforms.create(x, y, null).setDisplaySize(120, 20).setTint(0x228b22).refreshBody();
        coins.create(x, y - 40, null).setDisplaySize(20, 20).setTint(0xffff00);

        if (level > 1 && i % 2 === 0) {
            let e = enemies.create(x, y - 50, null).setDisplaySize(30, 30).setTint(0xff0000);
            e.setVelocityX(-80 - (level * 10));
        }
    }

    goal = scene.physics.add.staticSprite(4800, 350, null).setDisplaySize(30, 150).setTint(0xffffff);
}

function update() {
    if (cursors.left.isDown || moveLeft) {
        player.setVelocityX(-200);
        player.anims.play('left', true);
    } else if (cursors.right.isDown || moveRight) {
        player.setVelocityX(200);
        player.anims.play('right', true);
    } else {
        player.setVelocityX(0);
        player.anims.play('turn');
    }

    if ((cursors.up.isDown || isJumping) && player.body.touching.down) {
        player.setVelocityY(-600);
    }

    enemies.children.iterate(e => {
        if (e && e.body.blocked.left) e.setVelocityX(100);
        if (e && e.body.blocked.right) e.setVelocityX(-100);
    });

    if (player.y > 500) restartPos();
}

function handleEnemyCollision(p, e) {
    if (p.body.touching.down && e.body.touching.up) {
        e.disableBody(true, true);
        p.setVelocityY(-400);
        score += 50;
        document.getElementById('score').innerText = score;
    } else {
        lives--;
        document.getElementById('lives').innerText = lives;
        if (lives <= 0) { alert("GAME OVER!"); location.reload(); }
        else restartPos();
    }
}

function nextLevel() {
    if (currentLevel < 10) {
        currentLevel++;
        alert("Level " + currentLevel);
        document.getElementById('lvl').innerText = currentLevel;
        this.scene.restart();
    } else {
        alert("YOU WIN!"); location.reload();
    }
}

function restartPos() { player.setX(100); player.setY(300); }

function initMobileControls() {
    document.getElementById('left-btn').ontouchstart = () => moveLeft = true;
    document.getElementById('left-btn').ontouchend = () => moveLeft = false;
    document.getElementById('right-btn').ontouchstart = () => moveRight = true;
    document.getElementById('right-btn').ontouchend = () => moveRight = false;
    document.getElementById('jump-btn').ontouchstart = () => isJumping = true;
    document.getElementById('jump-btn').ontouchend = () => isJumping = false;
}
</script>
</body>
</html>
